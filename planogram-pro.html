<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Planogram · Ost og pålæg</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@zxing/library@0.21.0/umd/index.min.js"></script>
<style>
  :root {
    /* Dark theme (default) */
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --surface3: #242935;
    --border: #2a3040;
    --border-strong: #3a4155;
    --accent: #00d4ff;
    --accent-soft: rgba(0, 212, 255, 0.1);
    --success: #4ade80;
    --success-soft: rgba(74, 222, 128, 0.1);
    --warning: #fbbf24;
    --danger: #f87171;
    --danger-soft: rgba(248, 113, 113, 0.1);
    --text: #e8eaf0;
    --text-dim: #8b92a8;
    --text-faint: #5a6378;
    --highlight: #ffd700;
    --done: #4ade80;
    --shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  [data-theme="light"] {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface2: #f0f3f8;
    --surface3: #e4e9f1;
    --border: #d8dde7;
    --border-strong: #c0c8d5;
    --accent: #0284c7;
    --accent-soft: rgba(2, 132, 199, 0.1);
    --success: #16a34a;
    --success-soft: rgba(22, 163, 74, 0.1);
    --warning: #d97706;
    --danger: #dc2626;
    --danger-soft: rgba(220, 38, 38, 0.1);
    --text: #1a202c;
    --text-dim: #64748b;
    --text-faint: #94a3b8;
    --highlight: #ca8a04;
    --done: #16a34a;
    --shadow: 0 10px 40px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), #0284c7);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    color: #fff;
    font-size: 15px;
    font-family: 'JetBrains Mono', monospace;
  }

  .logo-text h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .logo-text p {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
    display: flex;
    gap: 8px;
  }

  .search-input {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 10px 42px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: all 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 16px;
    pointer-events: none;
  }

  .btn-scan {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0 16px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  [data-theme="light"] .btn-scan { color: #fff; }

  .btn-scan:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-soft); }
  .btn-scan:active { transform: translateY(0); }

  .icon-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    width: 38px;
    height: 38px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }

  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* PROGRESS BAR */
  .progress-section {
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .progress-bar {
    flex: 1;
    min-width: 150px;
    height: 8px;
    background: var(--surface3);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--success), #22c55e);
    border-radius: 4px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  .progress-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }

  .progress-text .percent {
    color: var(--success);
  }

  .quick-stats {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .stat-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .stat-chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .stat-chip strong {
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
  }

  /* FILTERS */
  .filters-row {
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .filter-chip {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text-dim);
    padding: 7px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .filter-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .filter-chip.new-style.active {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }

  .filter-chip.remaining-style.active {
    background: var(--warning);
    border-color: var(--warning);
    color: #fff;
  }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    height: calc(100vh - 155px);
  }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .sidebar h2 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    font-weight: 700;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .fag-nav {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .fag-nav-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .fag-nav-btn:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  .fag-nav-btn.active {
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  .fag-nav-info {
    flex: 1;
    min-width: 0;
  }

  .fag-label {
    font-size: 13px;
    font-weight: 700;
  }

  .fag-sublabel {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .fag-nav-progress {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    flex-shrink: 0;
  }

  .mini-progress {
    width: 40px;
    height: 3px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
  }

  .mini-progress-fill {
    height: 100%;
    background: var(--success);
    transition: width 0.3s;
  }

  .mini-progress-text {
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    color: var(--text-dim);
  }

  /* DETAIL PANEL */
  .detail-panel {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    display: none;
  }

  .detail-panel.visible { display: block; }

  .detail-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 10px;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }

  .detail-row:last-child { border-bottom: none; }
  .detail-row .label { color: var(--text-dim); font-weight: 500; flex-shrink: 0; }
  .detail-row .val { font-family: 'JetBrains Mono', monospace; font-weight: 600; text-align: right; word-break: break-word; }

  .location-badge {
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--accent-soft), transparent);
    border: 1.5px solid var(--accent);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }

  .loc-main {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .loc-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
    font-weight: 500;
  }

  .replacement-info {
    margin-top: 10px;
    padding: 10px;
    background: var(--success-soft);
    border: 1px solid var(--success);
    border-radius: 8px;
    font-size: 11px;
    color: var(--success);
    line-height: 1.5;
  }

  .replacement-info strong {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .btn-mark-done {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: var(--success);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
  }

  .btn-mark-done:hover { transform: translateY(-1px); }
  .btn-mark-done.done { background: var(--surface3); color: var(--text-dim); }

  /* FAG SECTION */
  .fag-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .fag-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: linear-gradient(135deg, var(--surface2), var(--surface));
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    gap: 12px;
  }

  .fag-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
    flex: 1;
  }

  .fag-number {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), #0284c7);
    color: #fff;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    flex-shrink: 0;
  }

  .fag-title-block { min-width: 0; flex: 1; }
  .fag-title { font-size: 14px; font-weight: 700; }
  .fag-subtitle { font-size: 11px; color: var(--text-dim); margin-top: 2px; font-weight: 500; }

  .fag-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .badge {
    padding: 3px 9px;
    border-radius: 100px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
  }

  .badge-accent { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); }
  .badge-success { background: var(--success-soft); color: var(--success); border: 1px solid var(--success); }

  .fag-mini-progress {
    width: 60px;
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
  }

  .fag-mini-fill { height: 100%; background: var(--success); transition: width 0.3s; }

  .fag-chevron {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--surface3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--text-dim);
    transition: all 0.2s;
    flex-shrink: 0;
    font-weight: 700;
  }

  .fag-section.collapsed .fag-chevron {
    transform: rotate(-90deg);
  }

  .fag-header:hover .fag-chevron {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* SHELVES */
  .shelf-container {
    padding: 12px 14px;
  }

  .shelf { margin-bottom: 10px; }

  .shelf-label {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 5px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
  }

  .shelf-label .notch-tag {
    background: var(--surface3);
    color: var(--text-dim);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 9px;
  }

  .shelf-row {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    background: linear-gradient(180deg, var(--surface2), var(--surface));
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    min-height: 58px;
  }

  /* PRODUCT CARD */
  .product-card {
    background: var(--surface3);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 6px 9px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 115px;
    max-width: 170px;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .product-card:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(0,212,255,0.1);
  }

  .product-card.highlighted {
    border-color: var(--highlight);
    background: rgba(255,215,0,0.12);
    box-shadow: 0 0 0 3px rgba(255,215,0,0.25);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .product-card.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .product-card.is-new::before {
    content: 'NY';
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--success);
    color: #fff;
    font-size: 9px;
    font-weight: 800;
    padding: 1px 5px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    z-index: 2;
  }

  /* Check button on card */
  .card-check {
    position: absolute;
    top: 5px;
    left: 5px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border-strong);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    color: transparent;
    transition: all 0.15s;
    z-index: 3;
  }

  .card-check:hover {
    border-color: var(--success);
    background: var(--success-soft);
    transform: scale(1.1);
  }

  .product-card.done .card-check {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }

  .product-card.done {
    opacity: 0.55;
    background: var(--success-soft);
    border-color: var(--success);
  }

  .product-card.done .product-name {
    text-decoration: line-through;
    text-decoration-color: var(--success);
  }

  .product-card.done::after {
    display: none;
  }

  /* PRODUCT MODAL */
  .product-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 1500;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }

  .product-modal.visible { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .product-modal-content {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    max-width: 420px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow);
    animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .pm-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    z-index: 10;
    transition: all 0.15s;
  }

  .pm-close:hover {
    background: var(--danger-soft);
    border-color: var(--danger);
    color: var(--danger);
  }

  .pm-image-wrap {
    width: 100%;
    aspect-ratio: 1;
    max-height: 300px;
    background: linear-gradient(135deg, var(--surface2), var(--surface3));
    border-radius: 20px 20px 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .pm-image-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    padding: 20px;
  }

  .pm-image-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 500;
  }

  .pm-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .pm-no-image {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: var(--text-faint);
    text-align: center;
    padding: 20px;
  }

  .pm-no-image-icon {
    font-size: 48px;
    opacity: 0.5;
  }

  .pm-no-image-text {
    font-size: 12px;
    font-weight: 500;
  }

  .pm-body {
    padding: 20px;
  }

  .pm-tags {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .pm-tag {
    font-size: 10px;
    font-weight: 800;
    padding: 3px 8px;
    border-radius: 100px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }

  .pm-tag-new {
    background: var(--success-soft);
    color: var(--success);
    border: 1px solid var(--success);
  }

  .pm-tag-done {
    background: var(--success);
    color: #fff;
  }

  .pm-name {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .pm-ean {
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    font-weight: 500;

// ============ STATE ============
let activeFilter = 'all';

// ============ STORAGE ============
async function loadProgress() {
  try {
    const res = await window.storage.get('planogram-done');
    if (res && res.value) {
      doneProducts = new Set(JSON.parse(res.value));
    }
  } catch (e) {
    // No data yet, that's fine
  }
  updateProgress();
  updateAllCards();
}

async function saveProgress() {
  try {
    await window.storage.set('planogram-done', JSON.stringify([...doneProducts]));
  } catch (e) { console.error(e); }
}

async function loadTheme() {
  try {
    const res = await window.storage.get('planogram-theme');
    if (res && res.value) {
      setTheme(res.value);
    } else {
      // Auto-detect based on time
      const hour = new Date().getHours();
      setTheme(hour >= 7 && hour < 19 ? 'light' : 'dark');
    }
  } catch (e) {
    setTheme('dark');
  }
}

async function saveTheme(theme) {
  try { await window.storage.set('planogram-theme', theme); } catch (e) {}
}

function setTheme(theme) {
  document.body.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
  const cur = document.body.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  setTheme(next);
  saveTheme(next);
}

// ============ BUILD UI ============
function buildFagNav() {
  const nav = document.getElementById('fagNav');
  nav.innerHTML = '';
  for (let f = 1; f <= 8; f++) {
    const fagProds = products.filter(p => p.fag === f);
    const done = fagProds.filter(p => doneProducts.has(p.ean)).length;
    const pct = Math.round((done / fagProds.length) * 100);

    const btn = document.createElement('div');
    btn.className = 'fag-nav-btn';
    btn.id = `nav-fag-${f}`;
    btn.innerHTML = `
      <div class="fag-nav-info">
        <div class="fag-label">${fagLabels[f].title}</div>
        <div class="fag-sublabel">${fagLabels[f].sub}</div>
      </div>
      <div class="fag-nav-progress">
        <div class="mini-progress"><div class="mini-progress-fill" style="width:${pct}%"></div></div>
        <div class="mini-progress-text">${done}/${fagProds.length}</div>
      </div>
    `;
    btn.onclick = () => scrollToFag(f);
    nav.appendChild(btn);
  }
}

function buildContent() {
  const content = document.getElementById('contentArea');
  content.innerHTML = '';
  for (let f = 1; f <= 8; f++) {
    const fagProds = products.filter(p => p.fag === f);
    content.appendChild(buildFagSection(f, fagProds));
  }
}

function buildFagSection(fagNum, prods) {
  const section = document.createElement('div');
  section.className = 'fag-section';
  section.id = `fag-section-${fagNum}`;
  const newCount = prods.filter(p => newEANs.has(p.ean)).length;
  const done = prods.filter(p => doneProducts.has(p.ean)).length;
  const pct = Math.round((done / prods.length) * 100);
  const newBadge = newCount > 0 ? `<span class="badge badge-success">${newCount} ny</span>` : '';

  section.innerHTML = `
    <div class="fag-header" onclick="toggleFag(${fagNum})">
      <div class="fag-header-left">
        <div class="fag-number">${fagNum}</div>
        <div class="fag-title-block">
          <div class="fag-title">${fagLabels[fagNum].title}</div>
          <div class="fag-subtitle">${fagLabels[fagNum].sub}</div>
        </div>
      </div>
      <div class="fag-meta">
        ${newBadge}
        <div class="fag-mini-progress"><div class="fag-mini-fill" id="fag-fill-${fagNum}" style="width:${pct}%"></div></div>
        <span class="badge badge-accent" id="fag-count-${fagNum}">${done}/${prods.length}</span>
        <div class="fag-chevron">▼</div>
      </div>
    </div>
    <div class="shelf-container" id="fag-body-${fagNum}">
      ${buildShelves(prods)}
    </div>
  `;
  return section;
}

function buildShelves(prods) {
  const hyldeMap = {};
  prods.forEach(p => {
    if (!hyldeMap[p.hylde]) hyldeMap[p.hylde] = [];
    hyldeMap[p.hylde].push(p);
  });

  const hyldeNames = {1:'Hylde 1 (øverst)', 2:'Hylde 2', 3:'Hylde 3', 4:'Hylde 4', 5:'Hylde 5', 6:'Hylde 6 (nederst)'};
  let html = '';
  Object.keys(hyldeMap).sort((a,b) => a-b).forEach(h => {
    const ps = hyldeMap[h];
    const notch = ps[0].notch;
    html += `
      <div class="shelf">
        <div class="shelf-label">
          ${hyldeNames[h]}
          <span class="notch-tag">Notch ${notch}</span>
        </div>
        <div class="shelf-row">
          ${ps.map(p => buildProductCard(p)).join('')}
        </div>
      </div>
    `;
  });
  return html;
}

function buildProductCard(p) {
  const isNew = newEANs.has(p.ean);
  const isDone = doneProducts.has(p.ean);
  const classes = ['product-card'];
  if (isNew) classes.push('is-new');
  if (isDone) classes.push('done');

  return `
    <div class="${classes.join(' ')}"
         id="card-${p.ean}"
         onclick="openProductModal('${p.ean}')">
      <div class="card-check" onclick="event.stopPropagation(); toggleDone('${p.ean}')" title="Markér som færdig">✓</div>
      <div class="product-pos">#${p.pos}</div>
      <div class="product-name">${p.name}</div>
      <div class="product-ean">${p.ean}</div>
    </div>
  `;
}

function updateAllCards() {
  products.forEach(p => {
    const card = document.getElementById(`card-${p.ean}`);
    if (!card) return;
    if (doneProducts.has(p.ean)) card.classList.add('done');
    else card.classList.remove('done');
  });
  // Update fag counters
  for (let f = 1; f <= 8; f++) {
    const fagProds = products.filter(p => p.fag === f);
    const done = fagProds.filter(p => doneProducts.has(p.ean)).length;
    const pct = Math.round((done / fagProds.length) * 100);
    const fill = document.getElementById(`fag-fill-${f}`);
    const count = document.getElementById(`fag-count-${f}`);
    if (fill) fill.style.width = pct + '%';
    if (count) count.textContent = `${done}/${fagProds.length}`;
  }
  buildFagNav();
}

function updateProgress() {
  const total = products.length;
  const done = doneProducts.size;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressCount').textContent = `${done} / ${total}`;
  document.getElementById('progressPercent').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ============ FAG TOGGLE ============
const collapsedFags = new Set();
function toggleFag(f) {
  const section = document.getElementById(`fag-section-${f}`);
  const body = document.getElementById(`fag-body-${f}`);
  if (!section || !body) return;

  if (collapsedFags.has(f)) {
    body.style.display = '';
    section.classList.remove('collapsed');
    collapsedFags.delete(f);
  } else {
    body.style.display = 'none';
    section.classList.add('collapsed');
    collapsedFags.add(f);
  }
}

// Expand all fags
function expandAllFags() {
  for (let f = 1; f <= 8; f++) {
    const section = document.getElementById(`fag-section-${f}`);
    const body = document.getElementById(`fag-body-${f}`);
    if (body) body.style.display = '';
    if (section) section.classList.remove('collapsed');
  }
  collapsedFags.clear();
}

// ============ NAVIGATION ============
function scrollToFag(f) {
  document.querySelectorAll('.fag-nav-btn').forEach(b => b.classList.remove('active'));
  const nav = document.getElementById(`nav-fag-${f}`);
  if (nav) nav.classList.add('active');

  // Auto-expand if collapsed
  if (collapsedFags.has(f)) {
    toggleFag(f);
  }

  const section = document.getElementById(`fag-section-${f}`);
  if (section) section.scrollIntoView({behavior: 'smooth', block: 'start'});
}

async function loadProductImage(ean, imageWrap) {
  if (imageCache[ean] !== undefined) {
    renderProductImage(imageCache[ean], imageWrap);
    return;
  }

  try {
    const response = await fetch(`https://world.openfoodfacts.org/api/v2/product/${ean}.json?fields=image_front_url,image_url`);
    if (!response.ok) throw new Error('Not found');
    const data = await response.json();
    const imageUrl = data.product?.image_front_url || data.product?.image_url || null;
    imageCache[ean] = imageUrl;
    renderProductImage(imageUrl, imageWrap);
  } catch (e) {
    imageCache[ean] = null;
    renderProductImage(null, imageWrap);
  }
}

function renderProductImage(url, imageWrap) {
  if (url) {
    const img = new Image();
    img.onload = () => {
      imageWrap.innerHTML = '';
      imageWrap.appendChild(img);
    };
    img.onerror = () => renderNoImage(imageWrap);
    img.src = url;
    img.alt = 'Produkt';
  } else {
    renderNoImage(imageWrap);
  }
}

function renderNoImage(imageWrap) {
  imageWrap.innerHTML = `
    <div class="pm-no-image">
      <div class="pm-no-image-icon">📦</div>
      <div class="pm-no-image-text">Intet billede tilgængeligt</div>
    </div>
  `;
}

// ============ SEARCH ============
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => doSearch(this.value.trim()), 200);
});

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeSearch();
  if (e.key === 'Enter') {
    const first = document.querySelector('.result-item');
    if (first) first.click();
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeSearch();
    if (scannerActive) closeScanner();
    document.getElementById('productModal').classList.remove('visible');
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 's' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    openScanner();
  }
});

function doSearch(query) {
  const resultsDiv = document.getElementById('searchResults');
  const resultsList = document.getElementById('resultsList');
  const label = document.getElementById('resultsLabel');

  if (!query) {
    closeSearch();
    document.querySelectorAll('.product-card.highlighted').forEach(c => c.classList.remove('highlighted'));
    return;
  }

  const q = query.toLowerCase();
  let matches = products.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.ean.includes(q) ||
    String(p.pos).includes(q)
  );

  document.querySelectorAll('.product-card').forEach(c => c.classList.remove('highlighted'));
  matches.forEach(p => {
    const card = document.getElementById(`card-${p.ean}`);
    if (card) card.classList.add('highlighted');
  });

  label.textContent = `${matches.length} resultater for "${query}"`;

  if (matches.length === 0) {
    resultsList.innerHTML = `<div class="no-results">🔍 Ingen resultater for "${query}"</div>`;
  } else {
    resultsList.innerHTML = matches.slice(0, 30).map(p => {
      const isNew = newEANs.has(p.ean);
      const isDone = doneProducts.has(p.ean);
      const nameMark = p.name.replace(new RegExp(`(${escapeRegex(query)})`, 'gi'), '<mark>$1</mark>');
      const eanMark = p.ean.replace(new RegExp(`(${escapeRegex(query)})`, 'gi'), '<mark>$1</mark>');
      return `
        <div class="result-item" onclick="selectProduct('${p.ean}')">
          <div class="result-info">
            ${isNew ? '<span class="tag tag-new">NY</span>' : ''}
            ${isDone ? '<span class="tag tag-done">✓</span>' : ''}
            <div class="result-name">${nameMark}</div>
            <div class="result-ean">${eanMark}</div>
          </div>
          <div class="result-location">Fag ${p.fag} · H${p.hylde} · #${p.pos}</div>
        </div>
      `;
    }).join('');
    if (matches.length > 30) {
      resultsList.innerHTML += `<div style="padding:10px;text-align:center;font-size:12px;color:var(--text-dim)">... og ${matches.length-30} flere</div>`;
    }
  }

  resultsDiv.classList.add('visible');
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function closeSearch() {
  document.getElementById('searchResults').classList.remove('visible');
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.product-card.highlighted').forEach(c => c.classList.remove('highlighted'));
}

// ============ FILTER ============
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  document.querySelectorAll('.product-card').forEach(c => {
    const ean = c.id.replace('card-', '');
    let show = true;
    if (activeFilter === 'new') show = newEANs.has(ean);
    else if (activeFilter === 'done') show = doneProducts.has(ean);
    else if (activeFilter === 'remaining') show = !doneProducts.has(ean);
    c.style.display = show ? '' : 'none';
  });
}

// ============ SCANNER ============
async function openScanner() {
  const modal = document.getElementById('scannerModal');
  modal.classList.add('visible');
  scannerActive = true;
  document.getElementById('scannerStatus').textContent = 'Starter kamera...';

  try {
    codeReader = new ZXing.BrowserMultiFormatReader();
    const video = document.getElementById('scannerVideo');

    const devices = await codeReader.listVideoInputDevices();
    // Prefer rear camera
    let deviceId = null;
    const rear = devices.find(d => /back|rear|environment/i.test(d.label));
    if (rear) deviceId = rear.deviceId;
    else if (devices.length > 0) deviceId = devices[devices.length - 1].deviceId;

    document.getElementById('scannerStatus').textContent = 'Ret kameraet mod stregkoden';

    codeReader.decodeFromVideoDevice(deviceId, video, (result, err) => {
      if (result && scannerActive) {
        handleScan(result.getText());
      }
    });
  } catch (e) {
    document.getElementById('scannerStatus').textContent = '⚠️ Kan ikke tilgå kamera';
    console.error(e);
  }
}

function closeScanner() {
  scannerActive = false;
  document.getElementById('scannerModal').classList.remove('visible');
  if (codeReader) {
    try { codeReader.reset(); } catch (e) {}
    codeReader = null;
  }
}

function handleScan(code) {
  if (!scannerActive) return;
  scannerActive = false; // Prevent duplicate scans

  // Strong vibration for scan
  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
  playBeep(true);

  // Check if removed
  if (removedProducts[code]) {
    const info = removedProducts[code];
    const replacedBy = info.replacedBy ? eanMap[info.replacedBy] : null;
    document.getElementById('scannerStatus').textContent = '⚠️ UDGÅET VARE';
    setTimeout(() => {
      closeScanner();
      let msg = `⚠️ "${info.name}" er udgået.`;
      if (replacedBy) {
        msg += ` Erstattes af: ${info.replacedByName}`;
        showToast(msg, 'warning');
        setTimeout(() => selectProduct(replacedBy.ean), 500);
      } else {
        msg += ' Ingen erstatning.';
        showToast(msg, 'error');
      }
    }, 600);
    return;
  }

  // Look up product
  const p = eanMap[code];
  if (p) {
    document.getElementById('scannerStatus').textContent = '✓ FUNDET!';
    setTimeout(() => {
      closeScanner();
      selectProduct(code);
    }, 400);
  } else {
    document.getElementById('scannerStatus').textContent = '❌ Ikke i planogrammet';
    setTimeout(() => {
      closeScanner();
      showToast(`❌ EAN ${code} findes ikke i dette planogram`, 'error');
    }, 800);
  }
}

function manualEntry() {
  closeScanner();
  const ean = prompt('Indtast EAN-nummer:');
  if (ean) handleScan(ean.trim());
}

// ============ AUDIO FEEDBACK ============
let audioCtx = null;
function playBeep(isScan) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = isScan ? 1200 : 800;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
  } catch (e) {}
}

// ============ TOAST ============
let toastTimer;
function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  const icons = { success: '✓', warning: '⚠️', error: '❌' };
  document.getElementById('toastIcon').textContent = icons[type] || '📍';
  document.getElementById('toastMsg').textContent = msg;
  toast.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
}

// ============ RESET ============
async function resetProgress() {
  if (!confirm('Er du sikker på at du vil nulstille al fremgang?')) return;
  doneProducts.clear();
  await saveProgress();
  updateProgress();
  updateAllCards();
  showToast('🗑️ Fremgang nulstillet', 'warning');
}

// ============ INIT ============
async function init() {
  await loadTheme();
  buildContent();
  await loadProgress();
  buildFagNav();

  // Intersection observer for nav highlighting
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id.replace('fag-section-', '');
        document.querySelectorAll('.fag-nav-btn').forEach(b => b.classList.remove('active'));
        const navBtn = document.getElementById(`nav-fag-${id}`);
        if (navBtn) navBtn.classList.add('active');
      }
    });
  }, {threshold: 0.2});

  for (let f = 1; f <= 8; f++) {
    const s = document.getElementById(`fag-section-${f}`);
    if (s) observer.observe(s);
  }

  // Check URL hash for product selection (when coming from hub)
  if (window.location.hash && window.location.hash.startsWith('#ean=')) {
    const ean = window.location.hash.substring(5);
    setTimeout(() => {
      if (eanMap[ean]) selectProduct(ean);
    }, 300);
  }
}

init();
</script>
